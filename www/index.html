<!DOCTYPE html>
<html lang="ro" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<title>PDF Editor — METUSALEM969</title>
<style>
:root, [data-theme="dark"] {
  --bg: #0d1117;
  --s1: #161b22;
  --s2: #21262d;
  --border: #30363d;
  --accent: #e94560;
  --blue: #58a6ff;
  --green: #3fb950;
  --text: #e6edf3;
  --muted: #8b949e;
  --note-bg: #fff3a3;
  --note-text: #1a1a1a;
  --bar: 48px;
  --toolbar-h: 96px;
  --sidebar: 88px;
  --radius: 8px;
}
[data-theme="light"] {
  --bg: #f0f2f5;
  --s1: #ffffff;
  --s2: #e8eaed;
  --border: #d0d7de;
  --accent: #d63356;
  --blue: #0969da;
  --green: #1a7f37;
  --text: #1f2328;
  --muted: #656d76;
  --note-bg: #fff3a3;
  --note-text: #1a1a1a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
}

#toolbar {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.bar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  padding: 4px 8px;
  min-height: var(--bar);
}
.bar-row + .bar-row {
  border-top: 1px solid var(--border);
}
.bar-group {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: nowrap;
}
.bar-left { justify-content: flex-start; flex: 1 1 auto; min-width: 0; }
.bar-right { justify-content: flex-end; flex: 1 1 auto; min-width: 0; }
.bar-spacer { flex: 1 1 auto; min-width: 8px; max-width: 32px; }

.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .12s, border-color .12s;
  touch-action: manipulation;
}
.btn:hover  { background: var(--border); }
.btn:active { background: var(--accent); border-color: var(--accent); }
.btn:disabled { opacity: .3; cursor: not-allowed; pointer-events: none; }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { filter: brightness(1.1); }
.btn.active { background: rgba(88,166,255,.2); border-color: var(--blue); }

#page-info {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
  padding: 4px 8px;
  min-width: 72px;
  text-align: center;
  cursor: pointer;
  border-radius: var(--radius);
  border: 1px solid transparent;
}
#page-info:hover { border-color: var(--border); background: var(--s2); }

#page-jump {
  display: none;
  width: 52px;
  padding: 4px 6px;
  font-size: 12px;
  font-family: 'Courier New', monospace;
  background: var(--s2);
  border: 1px solid var(--blue);
  border-radius: var(--radius);
  color: var(--text);
  text-align: center;
}

.vline { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; margin: 0 2px; }

#color-inp {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-radius: 50%;
  padding: 1px;
  background: var(--s2);
  cursor: pointer;
  flex-shrink: 0;
}
input[type=range]#size-inp {
  -webkit-appearance: none;
  appearance: none;
  width: 68px;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
  flex-shrink: 0;
}
input[type=range]#size-inp::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--blue);
  cursor: pointer;
}

#main {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

#sidebar {
  width: 0;
  background: var(--s1);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
  transition: width .2s ease;
  scrollbar-width: thin;
}
#sidebar.open { width: var(--sidebar); }

.thumb {
  display: block;
  width: calc(var(--sidebar) - 16px);
  margin: 8px auto;
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 4px;
  overflow: hidden;
  background: var(--s2);
  position: relative;
}
.thumb canvas { display: block; width: 100%; height: auto; }
.thumb .thumb-num {
  position: absolute;
  bottom: 2px; right: 4px;
  font-size: 9px;
  background: rgba(0,0,0,.6);
  color: #fff;
  padding: 1px 4px;
  border-radius: 3px;
}
.thumb.active { border-color: var(--blue); }
.thumb:active { opacity: .8; }

#viewer {
  flex: 1;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 12px;
  background: var(--bg);
  position: relative;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x pan-y;
}

#dropzone {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  pointer-events: none;
}
#dropzone .dz-ico { font-size: 64px; opacity: .25; }
#dropzone h2 { font-size: 18px; color: var(--muted); font-weight: 600; }
#dropzone p  { font-size: 13px; color: var(--muted); opacity: .7; }

#canvas-wrap {
  position: relative;
  display: none;
  transform-origin: center center;
  flex-shrink: 0;
}
#pdf-canvas {
  display: block;
  box-shadow: 0 8px 40px rgba(0,0,0,.2);
  max-width: none;
  width: auto;
  height: auto;
}
#ann-canvas {
  position: absolute; top: 0; left: 0;
  display: block;
}

#bottombar {
  min-height: var(--bar);
  background: var(--s1);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  padding: 4px 8px;
  gap: 4px;
}

.tbtn {
  flex: 0 0 auto;
  width: 40px;
  min-width: 36px;
  height: 40px;
  background: none;
  border: none;
  border-radius: var(--radius);
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: background .12s, color .12s;
  touch-action: manipulation;
}
.tbtn:hover { background: var(--s2); color: var(--text); }
.tbtn.active {
  background: rgba(88,166,255,.15);
  color: var(--blue);
  border: 1px solid rgba(88,166,255,.3);
}

#loading {
  position: fixed; inset: 0;
  background: rgba(13,17,23,.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  font-size: 32px;
  flex-direction: column;
  gap: 12px;
}
[data-theme="light"] #loading { background: rgba(240,242,245,.9); }
#loading.on { display: flex; }
#loading span { font-size: 13px; color: var(--muted); }

#toast {
  position: fixed;
  bottom: calc(var(--bar) + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  padding: 7px 16px;
  border-radius: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  z-index: 300;
  white-space: nowrap;
  max-width: 90vw;
  text-overflow: ellipsis;
  overflow: hidden;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#note-dialog {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 250;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#note-dialog.on { display: flex; }
#note-dialog .box {
  background: var(--note-bg);
  color: var(--note-text);
  border-radius: 8px;
  padding: 12px;
  width: min(320px, 90vw);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
#note-dialog textarea {
  width: 100%;
  min-height: 80px;
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 8px;
  font-size: 14px;
  resize: vertical;
  font-family: inherit;
}
#note-dialog .actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }

input[type=file] { display: none; }

@media (max-width: 520px) {
  .btn { padding: 5px 7px; font-size: 11px; }
  input[type=range]#size-inp { width: 44px; }
  #page-info { min-width: 52px; padding: 4px 4px; font-size: 11px; }
  .tbtn { width: 36px; min-width: 32px; height: 36px; font-size: 16px; }
}
</style>
</head>
<body>

<div id="toolbar">
  <input type="file" id="file-inp" accept="application/pdf,.pdf">
  <div class="bar-row">
    <div class="bar-group bar-left">
      <button class="btn primary" id="btn-open">📂 PDF</button>
      <button class="btn" id="btn-thumbs" title="Miniaturi">🖼</button>
      <button class="btn" id="btn-prev" disabled>◀</button>
      <span id="page-info" title="Apasă pentru salt la pagină">— / —</span>
      <input type="number" id="page-jump" min="1" value="1">
      <button class="btn" id="btn-next" disabled>▶</button>
    </div>
    <div class="bar-group bar-right">
      <button class="btn" id="btn-theme" title="Mod întunecat">🌙</button>
      <button class="btn" id="btn-exp" disabled title="Export PDF">💾</button>
    </div>
  </div>
  <div class="bar-row">
    <div class="bar-group bar-left">
      <button class="btn" id="btn-zoom-out" title="Micșorează">🔍−</button>
      <button class="btn" id="btn-zoom-in" title="Mărește">🔍+</button>
      <button class="btn" id="btn-fit" title="Potrivește pagina">⊡</button>
    </div>
    <div class="bar-group bar-right">
      <input type="color" id="color-inp" value="#e94560" title="Culoare">
      <input type="range" id="size-inp" min="1" max="48" value="12" title="Grosime">
      <button class="btn" id="btn-undo" title="Anulează">↩</button>
      <button class="btn" id="btn-clear" title="Șterge pagina">🗑</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="sidebar"></div>
  <div id="viewer">
    <div id="dropzone">
      <div class="dz-ico">📄</div>
      <h2>PDF Editor METUSALEM969</h2>
      <p>Apasă 📂 PDF sau trage un fișier aici</p>
      <p style="font-size:11px;opacity:.6">Offline · PDF.js · jsPDF · Touch & Pinch</p>
    </div>
    <div id="canvas-wrap">
      <canvas id="pdf-canvas"></canvas>
      <canvas id="ann-canvas"></canvas>
    </div>
  </div>
</div>

<div id="bottombar">
  <div class="bar-group bar-left">
    <button class="tbtn active" id="t-scroll" data-tool="scroll" title="Scroll">👆</button>
    <button class="tbtn" id="t-pen" data-tool="pen" title="Pix">✏️</button>
    <button class="tbtn" id="t-marker" data-tool="marker" title="Marker">🖊️</button>
    <button class="tbtn" id="t-text" data-tool="text" title="Text">📝</button>
    <button class="tbtn" id="t-note" data-tool="note" title="Notă adezivă">📌</button>
  </div>
  <div class="bar-spacer" aria-hidden="true"></div>
  <div class="bar-group bar-right">
    <button class="tbtn" id="t-line" data-tool="line" title="Linie">╱</button>
    <button class="tbtn" id="t-rect" data-tool="rect" title="Dreptunghi">⬜</button>
    <button class="tbtn" id="t-arrow" data-tool="arrow" title="Săgeată">➤</button>
    <button class="tbtn" id="t-eraser" data-tool="eraser" title="Radieră">⬡</button>
  </div>
</div>

<div id="loading">⏳ <span id="loading-msg">Se încarcă...</span></div>
<div id="toast"></div>

<div id="note-dialog">
  <div class="box">
    <textarea id="note-text" placeholder="Scrie nota ta..."></textarea>
    <div class="actions">
      <button class="btn" id="note-cancel">Anulează</button>
      <button class="btn primary" id="note-ok">OK</button>
    </div>
  </div>
</div>

<script src="lib/pdf.min.js"></script>
<script src="lib/jspdf.umd.min.js"></script>
<script>
'use strict';

// ── PDF.js worker (local, offline-safe) ─────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.min.js';

// ── State ───────────────────────────────────────────────────────────────────
let pdfDoc = null;
let pageNum = 1;
let numPages = 0;
let scale = 1;
let pinchPreviewScale = null;
let curTool = 'scroll';
let isDrawing = false;
let activePointerId = null;
let annData = {};
let liveStroke = null;
let snapBase = null;
let renderTask = null;
let currentFileKey = null;
let currentFileName = '';
let notePendingPos = null;

const THUMB_MAX = 24;
const thumbCache = new Map();
const thumbOrder = [];

const pdfCvs = document.getElementById('pdf-canvas');
const annCvs = document.getElementById('ann-canvas');
const canvasWrap = document.getElementById('canvas-wrap');
const pdfCtx = pdfCvs.getContext('2d', { alpha: false });
const annCtx = annCvs.getContext('2d');
const viewer = document.getElementById('viewer');
const sidebar = document.getElementById('sidebar');
const colorEl = document.getElementById('color-inp');
const sizeEl = document.getElementById('size-inp');

// Pinch zoom state
let pinchStartDist = 0;
let pinchStartScale = 1;
let pinchActive = false;
let pinchPointers = new Map();

// ── Theme ───────────────────────────────────────────────────────────────────
const THEME_KEY = 'pdf-editor-theme-v2';

function updateThemeBtn() {
  const btn = document.getElementById('btn-theme');
  if (!btn) return;
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  btn.textContent = dark ? '☀️' : '🌙';
  btn.title = dark ? 'Mod luminos' : 'Mod întunecat';
}

function loadTheme() {
  const t = localStorage.getItem(THEME_KEY) || 'light';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeBtn();
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
  updateThemeBtn();
  showToast(next === 'dark' ? '🌙 Mod întunecat' : '☀️ Mod luminos');
}

loadTheme();

// ── Helpers ─────────────────────────────────────────────────────────────────
const px2doc = v => v / scale;
const doc2px = (v, sc) => v * (sc || scale);

function getColor() { return colorEl.value; }
function getSize() { return Number(sizeEl.value); }

function hexRGB(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

async function hashBuffer(buf) {
  if (crypto.subtle) {
    const h = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
  }
  return String(buf.byteLength);
}

let toastTimer;
function showToast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

function setLoading(on, msg = 'Se procesează...') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').classList.toggle('on', on);
}

function cancelRender() {
  if (renderTask) {
    try { renderTask.cancel(); } catch (_) {}
    renderTask = null;
  }
}

function destroyPdf() {
  cancelRender();
  if (pdfDoc) {
    try { pdfDoc.destroy(); } catch (_) {}
    pdfDoc = null;
  }
  thumbCache.forEach(entry => {
    if (entry.canvas) entry.canvas.width = 0;
  });
  thumbCache.clear();
  thumbOrder.length = 0;
  sidebar.innerHTML = '';
}

// ── Annotations persistence ─────────────────────────────────────────────────
function saveAnnotations() {
  if (!currentFileKey) return;
  try {
    localStorage.setItem('pdf-ann:' + currentFileKey, JSON.stringify(annData));
  } catch (e) {
    showToast('⚠️ Nu s-au putut salva adnotările');
  }
}

function loadAnnotations() {
  if (!currentFileKey) return;
  try {
    const raw = localStorage.getItem('pdf-ann:' + currentFileKey);
    if (raw) {
      annData = JSON.parse(raw);
      showToast('📎 Adnotări restaurate');
    }
  } catch (_) {
    annData = {};
  }
}

function persistStroke() {
  saveAnnotations();
}

// ── File loading ────────────────────────────────────────────────────────────
document.getElementById('file-inp').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) openFile(f);
  e.target.value = '';
});
document.getElementById('btn-open').addEventListener('click', () => document.getElementById('file-inp').click());

viewer.addEventListener('dragover', e => e.preventDefault());
viewer.addEventListener('drop', e => {
  e.preventDefault();
  const f = [...e.dataTransfer.files].find(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
  if (f) openFile(f);
});

async function openFile(file) {
  setLoading(true, 'Se încarcă ' + file.name + '…');
  try {
    destroyPdf();
    const buf = await file.arrayBuffer();
    currentFileKey = await hashBuffer(buf);
    currentFileName = file.name;
    annData = {};

    pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(buf) }).promise;

    numPages = pdfDoc.numPages;
    pageNum = 1;
    loadAnnotations();

    document.getElementById('dropzone').style.display = 'none';
    canvasWrap.style.display = 'block';
    document.getElementById('btn-prev').disabled = false;
    document.getElementById('btn-next').disabled = false;
    document.getElementById('btn-exp').disabled = false;

    await fitPage();
    buildThumbnailPlaceholders();
    scheduleThumbRender(pageNum);
    showToast('✅ ' + file.name + ' · ' + numPages + ' pagini');
  } catch (err) {
    console.error(err);
    showToast('❌ ' + (err.message || 'Eroare la încărcare'));
  }
  setLoading(false);
}

// ── Render page ─────────────────────────────────────────────────────────────
function viewerPadding() {
  return 24;
}

function computeFitScale(vp1) {
  const pad = viewerPadding();
  const maxW = Math.max(100, viewer.clientWidth - pad);
  const maxH = Math.max(100, viewer.clientHeight - pad);
  const scaleW = maxW / vp1.width;
  const scaleH = maxH / vp1.height;
  return Math.max(0.25, Math.min(5.0, Math.min(scaleW, scaleH)));
}

async function renderPage(num) {
  if (!pdfDoc) return;
  cancelRender();
  canvasWrap.style.transform = '';
  pinchPreviewScale = null;
  delete canvasWrap.dataset.pinchScale;

  const page = await pdfDoc.getPage(num);
  const vp = page.getViewport({ scale });

  pdfCvs.width = annCvs.width = Math.floor(vp.width);
  pdfCvs.height = annCvs.height = Math.floor(vp.height);
  pdfCvs.style.width = Math.floor(vp.width) + 'px';
  pdfCvs.style.height = Math.floor(vp.height) + 'px';
  annCvs.style.width = pdfCvs.style.width;
  annCvs.style.height = pdfCvs.style.height;

  renderTask = page.render({ canvasContext: pdfCtx, viewport: vp });
  try {
    await renderTask.promise;
  } catch (e) {
    if (e?.name !== 'RenderingCancelledException') throw e;
    return;
  } finally {
    renderTask = null;
    try { page.cleanup(); } catch (_) {}
  }

  redrawAll(num);
  updateNav();
  highlightThumb(num);
  snapBase = null;
}

function updateNav() {
  const info = document.getElementById('page-info');
  info.textContent = pdfDoc ? pageNum + ' / ' + numPages : '— / —';
  document.getElementById('btn-prev').disabled = !pdfDoc || pageNum <= 1;
  document.getElementById('btn-next').disabled = !pdfDoc || pageNum >= numPages;
  const jump = document.getElementById('page-jump');
  jump.max = numPages || 1;
  jump.value = pageNum;
}

async function goPage(d) {
  if (!pdfDoc) return;
  const n = pageNum + d;
  if (n < 1 || n > numPages) return;
  pageNum = n;
  await renderPage(pageNum);
  scheduleThumbRender(pageNum);
}

async function jumpToPage(n) {
  if (!pdfDoc) return;
  n = Math.max(1, Math.min(numPages, parseInt(n, 10) || 1));
  if (n === pageNum) return;
  pageNum = n;
  await renderPage(pageNum);
  scheduleThumbRender(pageNum);
}

async function doZoom(d) {
  if (!pdfDoc) return;
  scale = Math.max(0.35, Math.min(5.0, scale + d));
  await renderPage(pageNum);
}

async function fitPage() {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(pageNum);
  const vp1 = page.getViewport({ scale: 1 });
  scale = computeFitScale(vp1);
  try { page.cleanup(); } catch (_) {}
  await renderPage(pageNum);
  viewer.scrollTop = 0;
  viewer.scrollLeft = 0;
}

// Page jump UI
document.getElementById('page-info').addEventListener('click', () => {
  if (!pdfDoc) return;
  const info = document.getElementById('page-info');
  const jump = document.getElementById('page-jump');
  info.style.display = 'none';
  jump.style.display = 'inline-block';
  jump.value = pageNum;
  jump.focus();
  jump.select();
});
document.getElementById('page-jump').addEventListener('blur', () => {
  document.getElementById('page-info').style.display = '';
  document.getElementById('page-jump').style.display = 'none';
});
document.getElementById('page-jump').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    jumpToPage(e.target.value);
    e.target.blur();
  }
  if (e.key === 'Escape') e.target.blur();
});

document.getElementById('btn-prev').addEventListener('click', () => goPage(-1));
document.getElementById('btn-next').addEventListener('click', () => goPage(1));
document.getElementById('btn-zoom-in').addEventListener('click', () => doZoom(0.25));
document.getElementById('btn-zoom-out').addEventListener('click', () => doZoom(-0.25));
document.getElementById('btn-fit').addEventListener('click', fitPage);
document.getElementById('btn-theme').addEventListener('click', toggleTheme);

// ── Thumbnail sidebar ───────────────────────────────────────────────────────
document.getElementById('btn-thumbs').addEventListener('click', () => {
  sidebar.classList.toggle('open');
  document.getElementById('btn-thumbs').classList.toggle('active', sidebar.classList.contains('open'));
  if (sidebar.classList.contains('open') && pdfDoc) {
    for (let i = Math.max(1, pageNum - 2); i <= Math.min(numPages, pageNum + 4); i++) {
      scheduleThumbRender(i);
    }
  }
});

function buildThumbnailPlaceholders() {
  sidebar.innerHTML = '';
  for (let i = 1; i <= numPages; i++) {
    const div = document.createElement('div');
    div.className = 'thumb' + (i === pageNum ? ' active' : '');
    div.dataset.page = i;
    div.innerHTML = '<canvas></canvas><span class="thumb-num">' + i + '</span>';
    div.addEventListener('click', () => jumpToPage(i));
    sidebar.appendChild(div);
  }
}

function highlightThumb(n) {
  sidebar.querySelectorAll('.thumb').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.page, 10) === n);
  });
  const active = sidebar.querySelector('.thumb.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function evictThumbIfNeeded() {
  while (thumbOrder.length > THUMB_MAX) {
    const p = thumbOrder.shift();
    const entry = thumbCache.get(p);
    if (entry?.canvas) {
      entry.canvas.width = 0;
      entry.canvas.height = 0;
    }
    thumbCache.delete(p);
    const el = sidebar.querySelector('.thumb[data-page="' + p + '"] canvas');
    if (el) { el.width = 0; el.height = 0; }
  }
}

let thumbQueue = [];
let thumbBusy = false;

function scheduleThumbRender(p) {
  if (!pdfDoc || p < 1 || p > numPages) return;
  if (thumbCache.has(p)) return;
  if (!thumbQueue.includes(p)) thumbQueue.push(p);
  processThumbQueue();
}

async function processThumbQueue() {
  if (thumbBusy || !thumbQueue.length) return;
  thumbBusy = true;
  const p = thumbQueue.shift();
  try {
    if (!thumbCache.has(p) && pdfDoc) {
      const page = await pdfDoc.getPage(p);
      const THUMB_SCALE = 0.2;
      const vp = page.getViewport({ scale: THUMB_SCALE });
      const cvs = document.createElement('canvas');
      cvs.width = vp.width;
      cvs.height = vp.height;
      await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
      try { page.cleanup(); } catch (_) {}

      thumbCache.set(p, { canvas: cvs });
      thumbOrder.push(p);
      evictThumbIfNeeded();

      const el = sidebar.querySelector('.thumb[data-page="' + p + '"] canvas');
      if (el) {
        el.width = cvs.width;
        el.height = cvs.height;
        el.getContext('2d').drawImage(cvs, 0, 0);
      }
    }
  } catch (e) {
    console.warn('Thumb', p, e);
  }
  thumbBusy = false;
  if (thumbQueue.length) processThumbQueue();
}

// ── Tools ───────────────────────────────────────────────────────────────────
function setTool(t) {
  curTool = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('t-' + t)?.classList.add('active');

  const drawing = t !== 'scroll';
  annCvs.style.pointerEvents = drawing ? 'auto' : 'none';
  annCvs.style.touchAction = drawing ? 'none' : 'auto';
  viewer.style.touchAction = drawing ? 'pan-x pan-y' : 'pan-x pan-y';
  annCvs.style.cursor = t === 'text' || t === 'note' ? 'text' : (t === 'eraser' ? 'cell' : (drawing ? 'crosshair' : 'default'));
}

document.querySelectorAll('.tbtn').forEach(btn => {
  btn.addEventListener('click', () => setTool(btn.dataset.tool));
});

// ── Pointer events (mouse + touch unified) ──────────────────────────────────
function pointerPos(e) {
  const rect = annCvs.getBoundingClientRect();
  const rx = annCvs.width / rect.width;
  const ry = annCvs.height / rect.height;
  return {
    x: (e.clientX - rect.left) * rx,
    y: (e.clientY - rect.top) * ry
  };
}

function onPointerDown(e) {
  if (curTool === 'scroll' || pinchActive) return;
  if (activePointerId !== null) return;
  activePointerId = e.pointerId;
  try { annCvs.setPointerCapture(e.pointerId); } catch (_) {}

  const { x, y } = pointerPos(e);
  isDrawing = true;

  if (curTool === 'text') {
    isDrawing = false;
    activePointerId = null;
    promptText(x, y);
    return;
  }
  if (curTool === 'note') {
    isDrawing = false;
    activePointerId = null;
    promptNote(x, y);
    return;
  }

  const docX = px2doc(x), docY = px2doc(y);

  if (curTool === 'pen') {
    liveStroke = {
      type: 'pen', color: getColor(), size: getSize(),
      pts: [{ x: docX, y: docY }], drawScale: scale
    };
    drawPenSegment(x, y, x, y, liveStroke);
  } else if (curTool === 'eraser') {
    const sz = getSize();
    liveStroke = {
      type: 'eraser', size: sz,
      rects: [{ x: docX - sz / 2 / scale, y: docY - sz / 2 / scale, w: sz / scale, h: sz / scale }],
      drawScale: scale
    };
    drawEraserRect(x, y, sz);
  } else {
    snapBase = annCtx.getImageData(0, 0, annCvs.width, annCvs.height);
    liveStroke = {
      type: curTool, color: getColor(), size: getSize(),
      x: docX, y: docY, x2: docX, y2: docY, drawScale: scale
    };
  }
  e.preventDefault();
}

function onPointerMove(e) {
  if (e.pointerType === 'touch') {
    if (pinchPointers.has(e.pointerId)) {
      pinchPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    }
    if (pinchPointers.size === 2) return;
  }

  if (!isDrawing || e.pointerId !== activePointerId || curTool === 'scroll') return;
  const { x, y } = pointerPos(e);

  if (curTool === 'pen') {
    const pts = liveStroke.pts;
    const last = pts[pts.length - 1];
    drawPenSegment(doc2px(last.x), doc2px(last.y), x, y, liveStroke);
    pts.push({ x: px2doc(x), y: px2doc(y) });
  } else if (curTool === 'eraser') {
    const sz = getSize();
    const docX = px2doc(x), docY = px2doc(y);
    liveStroke.rects.push({
      x: docX - sz / 2 / scale, y: docY - sz / 2 / scale,
      w: sz / scale, h: sz / scale
    });
    drawEraserRect(x, y, sz);
  } else {
    if (snapBase) annCtx.putImageData(snapBase, 0, 0);
    liveStroke.x2 = px2doc(x);
    liveStroke.y2 = px2doc(y);
    drawStroke(annCtx, liveStroke);
  }
  e.preventDefault();
}

function onPointerUp(e) {
  pinchPointers.delete(e.pointerId);
  if (e.pointerId !== activePointerId) return;

  try { annCvs.releasePointerCapture(e.pointerId); } catch (_) {}
  activePointerId = null;

  if (!isDrawing) return;
  isDrawing = false;
  if (!liveStroke) return;

  if (!annData[pageNum]) annData[pageNum] = [];
  annData[pageNum].push(liveStroke);
  liveStroke = null;
  snapBase = null;
  redrawAll(pageNum);
  persistStroke();
}

annCvs.addEventListener('pointerdown', onPointerDown);
annCvs.addEventListener('pointermove', onPointerMove);
annCvs.addEventListener('pointerup', onPointerUp);
annCvs.addEventListener('pointercancel', onPointerUp);
annCvs.addEventListener('pointerleave', e => { if (e.pointerId === activePointerId) onPointerUp(e); });

// ── Pinch-to-zoom (touch events — reliable on Android WebView) ──────────────
function touchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}

function applyPinchPreview(newScale) {
  pinchPreviewScale = newScale;
  canvasWrap.style.transform = 'scale(' + (newScale / scale) + ')';
  canvasWrap.dataset.pinchScale = String(newScale);
}

async function commitPinch() {
  const pending = parseFloat(canvasWrap.dataset.pinchScale);
  canvasWrap.style.transform = '';
  pinchPreviewScale = null;
  delete canvasWrap.dataset.pinchScale;
  pinchActive = false;
  pinchStartDist = 0;
  pinchPointers.clear();
  if (pending && Math.abs(pending - scale) > 0.02) {
    scale = pending;
    await renderPage(pageNum);
  }
}

viewer.addEventListener('touchstart', e => {
  if (!pdfDoc || curTool !== 'scroll') return;
  if (e.touches.length === 2) {
    pinchActive = true;
    pinchStartDist = touchDist(e.touches);
    pinchStartScale = scale;
    isDrawing = false;
    liveStroke = null;
    activePointerId = null;
    e.preventDefault();
  }
}, { passive: false });

viewer.addEventListener('touchmove', e => {
  if (!pdfDoc || !pinchActive || e.touches.length !== 2 || pinchStartDist <= 0) return;
  const dist = touchDist(e.touches);
  const ratio = dist / pinchStartDist;
  const newScale = Math.max(0.25, Math.min(5.0, pinchStartScale * ratio));
  applyPinchPreview(newScale);
  e.preventDefault();
}, { passive: false });

viewer.addEventListener('touchend', e => {
  if (!pinchActive) return;
  if (e.touches.length < 2) commitPinch();
}, { passive: false });

viewer.addEventListener('touchcancel', () => {
  if (pinchActive) commitPinch();
}, { passive: false });

// Pointer pinch fallback (desktop trackpad / some browsers)
function pinchDistance() {
  const pts = [...pinchPointers.values()];
  if (pts.length < 2) return 0;
  const dx = pts[1].x - pts[0].x;
  const dy = pts[1].y - pts[0].y;
  return Math.hypot(dx, dy);
}

canvasWrap.addEventListener('pointerdown', e => {
  if (!pdfDoc || curTool !== 'scroll') return;
  pinchPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinchPointers.size === 2) {
    pinchActive = true;
    pinchStartDist = pinchDistance();
    pinchStartScale = scale;
    e.preventDefault();
  }
}, { passive: false });

canvasWrap.addEventListener('pointermove', e => {
  if (!pinchActive || !pinchPointers.has(e.pointerId)) return;
  pinchPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinchPointers.size === 2 && pinchStartDist > 0) {
    const ratio = pinchDistance() / pinchStartDist;
    applyPinchPreview(Math.max(0.25, Math.min(5.0, pinchStartScale * ratio)));
    e.preventDefault();
  }
}, { passive: false });

canvasWrap.addEventListener('pointerup', e => {
  pinchPointers.delete(e.pointerId);
  if (pinchActive && pinchPointers.size < 2) commitPinch();
});
canvasWrap.addEventListener('pointercancel', e => {
  pinchPointers.delete(e.pointerId);
  if (pinchActive && pinchPointers.size < 2) commitPinch();
});

// ── Drawing helpers ─────────────────────────────────────────────────────────
function drawPenSegment(x1, y1, x2, y2, stroke) {
  annCtx.save();
  annCtx.strokeStyle = stroke?.color || getColor();
  annCtx.lineWidth = stroke?.size || getSize();
  annCtx.lineCap = 'round';
  annCtx.lineJoin = 'round';
  annCtx.beginPath();
  annCtx.moveTo(x1, y1);
  annCtx.lineTo(x2, y2);
  annCtx.stroke();
  annCtx.restore();
}

function drawEraserRect(cx, cy, sz) {
  annCtx.save();
  annCtx.fillStyle = '#ffffff';
  annCtx.fillRect(cx - sz / 2, cy - sz / 2, sz, sz);
  annCtx.restore();
}

function drawStroke(ctx, s, sc) {
  sc = sc || scale;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const baseScale = s.drawScale || scale;
  const scaledLW = s.size * sc / baseScale;

  if (s.type === 'eraser') {
    ctx.fillStyle = '#ffffff';
    (s.rects || []).forEach(r => {
      ctx.fillRect(r.x * sc, r.y * sc, r.w * sc, r.h * sc);
    });
  } else if (s.type === 'pen') {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = Math.max(1, scaledLW);
    ctx.beginPath();
    (s.pts || []).forEach((p, i) => {
      const px = p.x * sc, py = p.y * sc;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.stroke();
  } else if (s.type === 'marker') {
    const [r, g, b] = hexRGB(s.color);
    ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',0.33)';
    const x = Math.min(s.x, s.x2) * sc;
    const y = Math.min(s.y, s.y2) * sc;
    const w = Math.abs(s.x2 - s.x) * sc;
    const h = Math.abs(s.y2 - s.y) * sc;
    if (w > 1 && h > 1) ctx.fillRect(x, y, w, h);
  } else if (s.type === 'line') {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = Math.max(1, scaledLW);
    ctx.beginPath();
    ctx.moveTo(s.x * sc, s.y * sc);
    ctx.lineTo(s.x2 * sc, s.y2 * sc);
    ctx.stroke();
  } else if (s.type === 'rect') {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = Math.max(1, scaledLW);
    const x = Math.min(s.x, s.x2) * sc;
    const y = Math.min(s.y, s.y2) * sc;
    const w = Math.abs(s.x2 - s.x) * sc;
    const h = Math.abs(s.y2 - s.y) * sc;
    if (w > 0 && h > 0) ctx.strokeRect(x, y, w, h);
  } else if (s.type === 'arrow') {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = Math.max(1, scaledLW);
    const fx = s.x * sc, fy = s.y * sc;
    const tx = s.x2 * sc, ty = s.y2 * sc;
    const ang = Math.atan2(ty - fy, tx - fx);
    const hl = Math.max(10, scaledLW * 5);
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(tx, ty);
    ctx.moveTo(tx - hl * Math.cos(ang - Math.PI / 7), ty - hl * Math.sin(ang - Math.PI / 7));
    ctx.lineTo(tx, ty);
    ctx.lineTo(tx - hl * Math.cos(ang + Math.PI / 7), ty - hl * Math.sin(ang + Math.PI / 7));
    ctx.stroke();
  } else if (s.type === 'text') {
    const fs = Math.max(10, scaledLW * 0.5 + 12);
    ctx.font = fs + 'px system-ui,sans-serif';
    ctx.fillStyle = s.color;
    ctx.fillText(s.text, s.x * sc, s.y * sc);
  } else if (s.type === 'note') {
    const pad = 8 * sc / baseScale;
    const fs = Math.max(11, scaledLW * 0.4 + 11);
    const lines = (s.text || '').split('\n');
    const lineH = fs * 1.3;
    const w = Math.max(120 * sc / baseScale, (s.w || 140) * sc);
    const h = Math.max(60 * sc / baseScale, pad * 2 + lines.length * lineH);
    const x = s.x * sc, y = s.y * sc;

    ctx.fillStyle = '#fff3a3';
    ctx.strokeStyle = '#e6c200';
    ctx.lineWidth = 1;
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);

    ctx.fillStyle = '#1a1a1a';
    ctx.font = fs + 'px system-ui,sans-serif';
    lines.forEach((line, i) => {
      ctx.fillText(line, x + pad, y + pad + fs + i * lineH);
    });
  }
  ctx.restore();
}

function redrawAll(num) {
  annCtx.clearRect(0, 0, annCvs.width, annCvs.height);
  (annData[num] || []).forEach(s => drawStroke(annCtx, s));
}

// ── Annotation actions ──────────────────────────────────────────────────────
function undo() {
  if (!annData[pageNum]?.length) { showToast('Nimic de anulat'); return; }
  annData[pageNum].pop();
  redrawAll(pageNum);
  persistStroke();
  showToast('↩ Anulat');
}

function clearPage() {
  if (!annData[pageNum]?.length) return;
  if (!confirm('Șterge toate adnotările de pe pagina curentă?')) return;
  annData[pageNum] = [];
  redrawAll(pageNum);
  persistStroke();
  showToast('🗑 Pagina curată');
}

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-clear').addEventListener('click', clearPage);

function promptText(cx, cy) {
  const txt = prompt('Text:');
  if (!txt?.trim()) return;
  if (!annData[pageNum]) annData[pageNum] = [];
  annData[pageNum].push({
    type: 'text', color: getColor(), size: getSize(),
    text: txt.trim(), x: px2doc(cx), y: px2doc(cy), drawScale: scale
  });
  redrawAll(pageNum);
  persistStroke();
}

function promptNote(cx, cy) {
  notePendingPos = { x: cx, y: cy };
  document.getElementById('note-text').value = '';
  document.getElementById('note-dialog').classList.add('on');
  document.getElementById('note-text').focus();
}

document.getElementById('note-cancel').addEventListener('click', () => {
  document.getElementById('note-dialog').classList.remove('on');
  notePendingPos = null;
});
document.getElementById('note-ok').addEventListener('click', () => {
  const txt = document.getElementById('note-text').value.trim();
  document.getElementById('note-dialog').classList.remove('on');
  if (!txt || !notePendingPos) { notePendingPos = null; return; }
  if (!annData[pageNum]) annData[pageNum] = [];
  annData[pageNum].push({
    type: 'note', text: txt,
    x: px2doc(notePendingPos.x), y: px2doc(notePendingPos.y),
    w: 140, size: getSize(), drawScale: scale
  });
  notePendingPos = null;
  redrawAll(pageNum);
  persistStroke();
});

// ── Export PDF (high quality) ───────────────────────────────────────────────
async function exportPDF() {
  if (!pdfDoc) return;
  setLoading(true, 'Se generează PDF-ul…');

  const tmpPdf = document.createElement('canvas');
  const tmpAnn = document.createElement('canvas');
  const ctxP = tmpPdf.getContext('2d', { alpha: false });
  const ctxA = tmpAnn.getContext('2d');
  let pdf = null;

  try {
    const { jsPDF } = window.jspdf;
    const EXP_SCALE = Math.min(3, Math.max(2, window.devicePixelRatio || 2));

    for (let p = 1; p <= numPages; p++) {
      setLoading(true, 'Export pagina ' + p + ' / ' + numPages + '…');
      const page = await pdfDoc.getPage(p);
      const vp = page.getViewport({ scale: EXP_SCALE });

      tmpPdf.width = tmpAnn.width = Math.floor(vp.width);
      tmpPdf.height = tmpAnn.height = Math.floor(vp.height);

      await page.render({ canvasContext: ctxP, viewport: vp }).promise;
      try { page.cleanup(); } catch (_) {}

      ctxA.clearRect(0, 0, tmpAnn.width, tmpAnn.height);
      (annData[p] || []).forEach(s => drawStroke(ctxA, s, EXP_SCALE));
      ctxP.drawImage(tmpAnn, 0, 0);

      const imgData = tmpPdf.toDataURL('image/png');
      const orient = vp.width > vp.height ? 'l' : 'p';
      const w = tmpPdf.width;
      const h = tmpPdf.height;

      if (p === 1) {
        pdf = new jsPDF({ orientation: orient, unit: 'px', format: [w, h], compress: true });
      } else {
        pdf.addPage([w, h], orient);
      }
      pdf.addImage(imgData, 'PNG', 0, 0, w, h, undefined, 'FAST');
    }

    const outName = currentFileName.replace(/\.pdf$/i, '') + '-adnotat.pdf';
    pdf.save(outName);
    showToast('✅ PDF exportat!');
  } catch (err) {
    console.error(err);
    showToast('❌ ' + (err.message || 'Eroare export'));
  } finally {
    tmpPdf.width = tmpAnn.width = 0;
    tmpPdf.height = tmpAnn.height = 0;
    setLoading(false);
  }
}
document.getElementById('btn-exp').addEventListener('click', exportPDF);

// ── Keyboard shortcuts ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!pdfDoc) return;
  if (e.target.matches('input, textarea')) return;
  const k = e.key;
  if (k === 'ArrowLeft' || k === 'PageUp') { goPage(-1); return; }
  if (k === 'ArrowRight' || k === 'PageDown') { goPage(1); return; }
  if (k === '+' || k === '=') doZoom(0.25);
  if (k === '-') doZoom(-0.25);
  if (k === 'f' || k === 'F') fitPage();
  if (e.ctrlKey && k === 'z') { e.preventDefault(); undo(); }
  const tools = { '1': 'scroll', '2': 'pen', '3': 'marker', '4': 'text', '5': 'line', '6': 'rect', '7': 'arrow', '8': 'eraser', '9': 'note' };
  if (tools[k]) setTool(tools[k]);
});

// ── Init ────────────────────────────────────────────────────────────────────
setTool('scroll');
updateNav();
